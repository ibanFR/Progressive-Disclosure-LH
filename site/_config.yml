title: Progressive Disclosure
description: A Learning Hour on progressive disclosure — keeping AGENTS.md short and disclosing knowledge to coding agents on demand
theme: just-the-docs

url: https://github.com/ibanFR/Progressive-Disclosure-LH
repository: https://github.com/ibanFR/Progressive-Disclosure-LH

aux_links:
  Iván Fernández: https://ibanfr.github.io/
  View on GitHub: https://github.com/ibanFR/Progressive-Disclosure-LH
  
aux_links_new_tab: true
back_to_top: true
back_to_top_text: "Back to top"

# Footer content
# appears at the bottom of every page's main content
# Note: The footer_content option is deprecated and will be removed in a future major release. Please use `_includes/footer_custom.html` for more robust
footer_content: "Iván Fernández. All rights reserved."

# Footer "Edit this page on GitHub" link text
gh_edit_link: true # show or hide edit this page link
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/ibanFR/Progressive-Disclosure-LH" # the github URL for your repo
gh_edit_branch: "main" # the branch that your docs is served from
gh_edit_source: site # the source that your files originate from
gh_edit_view_mode: "tree" # "tree" or "edit" if you want the user to jump into the editor immediately

callouts:
  warning:
    title: Warning
    color: red

# Kept in the repo but not built into the published site.
# Jekyll appends its own default excludes (Gemfile, caches, vendor/, …).
exclude:
  - harness/
  - AGENTS.md
  - CLAUDE.md
  - start_local_server.sh

defaults:
  # All regular Jekyll pages
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default